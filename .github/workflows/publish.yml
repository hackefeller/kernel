name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Must match package.json."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: just deps

      - name: Validate requested version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "$package_version" != "${{ inputs.version }}" ]; then
            echo "::error::Requested version ${{ inputs.version }} does not match package.json version $package_version."
            exit 1
          fi

      - name: Publish to npm
        run: just publish confirm=true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
