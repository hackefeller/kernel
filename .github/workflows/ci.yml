name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pr-target:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR target branch
        run: |
          echo "PR targets '${{ github.base_ref }}' branch - checking validity"
          if [ "${{ github.base_ref }}" != "main" ]; then
            echo "::error::PRs must target the 'main' branch."
            exit 1
          fi

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: just deps

      - name: Check
        run: just check

      - name: Build
        run: just build

      - name: Validate binary
        run: just validate-binary
